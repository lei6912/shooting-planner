// ============================================================
// Service Worker Registration (inline)
// ============================================================
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='shooting-planner-v2';
    const ASSETS=['/'];
    self.addEventListener('install',e=>{self.skipWaiting()});
    self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});
    self.addEventListener('fetch',e=>{
      e.respondWith(
        caches.match(e.request).then(r=>r||fetch(e.request).then(resp=>{
          if(resp.status===200){
            const c2=resp.clone();
            caches.open(CACHE).then(cache=>cache.put(e.request,c2));
          }
          return resp;
        }).catch(()=>caches.match('/')))
      );
    });
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swURL=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL).catch(()=>{});
}

// ============================================================
// Wake Lock API — keep screen on during the event
// ============================================================
let wakeLock=null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock=await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release',()=>{wakeLock=null;renderApp()});
      renderApp();
    }
  }catch(e){}
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible')requestWakeLock();
});

// ============================================================
// HELPERS
// ============================================================
function parseTime(t){const[h,m]=t.split(':').map(Number);return h*60+m}
function formatCountdown(ms){
  if(ms<=0)return'已到時間';
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0)return h+'時'+String(m).padStart(2,'0')+'分'+String(sec).padStart(2,'0')+'秒';
  if(m>0)return m+'分'+String(sec).padStart(2,'0')+'秒';
  return sec+'秒';
}
function getNow(){return new Date()}
function getCurrentMinutes(){
  if(state.useSimTime)return state.simHour*60+state.simMin;
  const n=getNow();return n.getHours()*60+n.getMinutes();
}
function getCurrentSeconds(){return state.useSimTime?0:getNow().getSeconds()}
function getChapterStyle(ch){return CHAPTER_COLORS[ch]||{bg:"#F9FAFB",border:"#6B7280",accent:"#4B5563",tag:"#E5E7EB"}}

// Audio
let audioCtx=null;
function getAudioCtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
function playChime(){
  try{
    const ctx=getAudioCtx();
    [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0.3,ctx.currentTime+i*0.15);
      g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+i*0.15+0.4);
      o.start(ctx.currentTime+i*0.15);o.stop(ctx.currentTime+i*0.15+0.4);
    });
  }catch(e){}
}
function playUrgentChime(){
  try{
    const ctx=getAudioCtx();
    [0,0.2,0.4].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;o.type='square';
      g.gain.setValueAtTime(0.25,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+t+0.15);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.15);
    });
  }catch(e){}
}
function vibrate(pattern){
  if(state.vibrationEnabled&&'vibrate' in navigator)navigator.vibrate(pattern);
}

// Progress
function getProgress(idx){
  const total=SCHEDULE[idx].shots.length;let done=0;
  for(let i=0;i<total;i++)if(state.checkedShots[idx+'-'+i])done++;
  return{done,total,pct:total?Math.round(done/total*100):0};
}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else if(k==='innerHTML')el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);
  });
  return el;
}

    fontFamily:"'Noto Sans TC',sans-serif"
  }});
  if(state.useSimTime)timeDisplay.textContent=String(state.simHour).padStart(2,'0')+':'+String(state.simMin).padStart(2,'0');
  else timeDisplay.textContent=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  bottom.appendChild(timeDisplay);

  bottom.appendChild(h('div',{style:{fontSize:'11px',color:state.soundEnabled?'#22C55E':'#EF4444'}},
    state.soundEnabled?'🔔 已開啟':'🔕 已關閉'));
  app.appendChild(bottom);
}

// Toggle helper
function makeToggle(on,cb){
  const btn=h('div',{style:{
    width:'48px',height:'26px',borderRadius:'13px',cursor:'pointer',position:'relative',
    background:on?'#FBBF24':'rgba(255,255,255,0.15)',transition:'background 0.2s'
  },onClick:cb});
  btn.appendChild(h('div',{style:{
    width:'20px',height:'20px',borderRadius:'50%',background:'#fff',
    position:'absolute',top:'3px',left:on?'25px':'3px',transition:'left 0.2s'
  }}));
  return btn;
}

// ============================================================
// INIT
// ============================================================
// Check if standalone (already installed as PWA)
const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
// Show install banner for Safari users who haven't installed
if(!isStandalone&&/iPhone|iPad/.test(navigator.userAgent)){
  state.showInstallBanner=true;
}

// Initial render + interval
renderApp();
setInterval(renderApp,1000);

// Request wake lock
if(state.keepScreenOn)requestWakeLock();

// Init audio context on first touch (iOS requirement)
document.addEventListener('touchstart',function initAudio(){
  try{getAudioCtx()}catch(e){}
  document.removeEventListener('touchstart',initAudio);
},{once:true});
</script>
</body>
</html>
