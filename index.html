<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>拍計畫 ｜ 國二忠 齋僧活動</title>

  <!-- Mobile / iOS PWA meta -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="color-scheme" content="dark" />

  <!-- iOS standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="拍計畫" />
  <meta name="format-detection" content="telephone=no" />

  <!-- Manifest -->
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    html, body {
      margin: 0; padding: 0;
      background: #1a1a2e;
      color: #E2E8F0;
      overscroll-behavior-y: contain;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      font-family: 'Noto Serif TC', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, serif;
      /* Avoid iOS double-tap zoom on buttons */
      touch-action: manipulation;
    }
    /* Disable pull-to-refresh interfering with the sticky header */
    body { min-height: 100vh; min-height: 100svh; }
    #root { min-height: 100vh; min-height: 100svh; }

    /* Splash while React boots */
    #boot {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #boot.hide { opacity: 0; pointer-events: none; }
    #boot .logo {
      width: 84px; height: 84px; border-radius: 22px;
      background: url(icons/icon-192.png) center/cover no-repeat;
      box-shadow: 0 18px 40px rgba(0,0,0,0.4), 0 0 28px rgba(251,191,36,0.18);
    }
    #boot .ttl {
      font-size: 16px; font-weight: 900; color: #FDE68A; letter-spacing: 2px;
    }
    #boot .sub { font-size: 12px; color: #94A3B8; }
    #boot .dot { display: inline-block; animation: bb 1.4s infinite; }
    @keyframes bb { 0%,80%,100% { opacity:0.2 } 40% { opacity: 1 } }

    /* Animations used by the React app */
    @keyframes float0 { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.1); } }
    @keyframes float1 { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-30px) rotate(5deg); } }
    @keyframes float2 { 0%,100% { transform: translateX(0); } 50% { transform: translateX(15px); } }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.4); } 50% { box-shadow: 0 0 0 12px rgba(251,191,36,0); } }
    @keyframes slideIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes modalIn { from { opacity:0; transform:scale(0.9) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }
    @keyframes progressGlow { 0%,100% { box-shadow: 0 0 5px rgba(251,191,36,0.3); } 50% { box-shadow: 0 0 15px rgba(251,191,36,0.6); } }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    button { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(251,191,36,0.3); border-radius: 4px; }
  </style>
</head>
<body>
  <div id="boot">
    <div class="logo"></div>
    <div class="ttl">拍計畫</div>
    <div class="sub">載入中<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
  </div>

  <div id="root"></div>

  <!-- React + Babel (pinned & integrity-protected) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="app.jsx"></script>

  <script>
    // Hide splash once React paints
    (function () {
      let hidden = false;
      function hide() {
        if (hidden) return;
        const root = document.getElementById('root');
        if (!root || !root.firstChild) return;
        const boot = document.getElementById('boot');
        if (boot) {
          boot.classList.add('hide');
          setTimeout(() => boot.remove(), 500);
        }
        hidden = true;
      }
      const obs = new MutationObserver(hide);
      obs.observe(document.getElementById('root'), { childList: true });
      // Safety fallback
      setTimeout(hide, 4000);
    })();

    // Register service worker (only over https or localhost — file:// will skip silently)
    if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
